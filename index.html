<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" type="text/css" href="main.css">

  <title>Efficient Network Segmentation Tool</title>
</head>

<body>

  <form>

    <label for="ipInput_id">ISP IP</label> <input type="text" placeholder="Input IP and its prefix" id="ipInput_id">

    <fieldset class="subnetEntry_class">
      <legend>Subnets <input type="button" value="Add Subnet"></legend>

      <fieldset class="subnetEntryNetworks_class">
        <legend>
          <input type="text" value="HQ" class="subnetEntryCategory_class">
          <input type="number" name="Condidence" value="100" max="100" min="0" class="subnetEntryCategory_class">
        </legend>
        <table>
          <tr>
            <th>Name</th>
            <th>Size</th>
          </tr>
          <tr class="subnetEntryNetworksEntry_class">
            <td> <input type="text" name="" value="Staff"></td>
            <td><input type="number" name="" value="256"></td>
          </tr>
          <tr class="subnetEntryNetworksEntry_class">
            <td> <input type="text" name="" value="Guest"></td>
            <td><input type="number" name="" value="64"></td>
          </tr>
          <tr>
            <td> <input type="button" value="Add Network"></td>
          </tr>
        </table>



      </fieldset>


    </fieldset>

    <input type="submit" value="Apply" id="subnetApplyButton_id">
  </form>

</body>

</html>
